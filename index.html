<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROYECTO S.E.M. — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c10;
    --surface:  #111318;
    --border:   #1e2230;
    --gold:     #c9a84c;
    --gold2:    #e8c96a;
    --green:    #22c55e;
    --red:      #ef4444;
    --orange:   #f97316;
    --muted:    #4a5060;
    --text:     #e2e8f0;
    --textdim:  #8892a4;
    --mono:     'Space Mono', monospace;
    --sans:     'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo-block h1 {
    font-family: var(--sans);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .logo-block p {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 3px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .live-dot {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--green);
    letter-spacing: 0.08em;
  }

  .live-dot::before {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .timestamp {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* ECOSYSTEM BAR */
  .ecosystem-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
  }

  .eco-stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding-right: 20px;
    border-right: 1px solid var(--border);
  }
  .eco-stat:last-child { border-right: none; }

  .eco-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .eco-value {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--gold2);
  }

  .eco-value.green { color: var(--green); }
  .eco-value.red   { color: var(--red); }
  .eco-value.orange { color: var(--orange); }

  /* GRID BOTS */
  .bots-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }

  @media (max-width: 900px) {
    .bots-grid { grid-template-columns: 1fr; }
  }

  /* BOT CARD */
  .bot-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .bot-card.hedge-active {
    border-color: var(--orange);
  }

  .bot-card.offline {
    border-color: var(--muted);
    opacity: 0.5;
  }

  /* Accent line top */
  .bot-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--gold);
    opacity: 0.5;
  }

  .bot-card.hedge-active::before {
    background: var(--orange);
    opacity: 1;
  }

  /* Card header */
  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .card-title {
    font-family: var(--sans);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: var(--text);
  }

  .card-subtitle {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  .status-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 2px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 700;
  }

  .status-badge.ok      { background: rgba(34,197,94,0.15);  color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .status-badge.hedge   { background: rgba(249,115,22,0.15); color: var(--orange); border: 1px solid rgba(249,115,22,0.3); }
  .status-badge.offline { background: rgba(74,80,96,0.2);    color: var(--muted); border: 1px solid var(--border); }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .stat-value.gold   { color: var(--gold2); }
  .stat-value.green  { color: var(--green); }
  .stat-value.orange { color: var(--orange); }

  /* Section label */
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Hucha */
  .hucha-block {
    margin-bottom: 16px;
  }

  .hucha-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .hucha-label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--textdim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .hucha-amount {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--gold2);
  }

  .hucha-bar-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .hucha-bar-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Hedge block */
  .hedge-block {
    margin-bottom: 14px;
    padding: 12px;
    background: rgba(249,115,22,0.05);
    border: 1px solid rgba(249,115,22,0.2);
  }

  .hedge-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .hedge-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--orange);
    font-weight: 700;
    letter-spacing: 0.06em;
  }

  .hedge-pct {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--orange);
  }

  .hedge-details {
    display: flex;
    gap: 16px;
    margin-bottom: 10px;
  }

  .hedge-detail {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .hedge-detail-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .hedge-detail-value {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    font-weight: 700;
  }

  /* Progress bar hedge */
  .progress-track {
    height: 8px;
    background: rgba(249,115,22,0.15);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), var(--gold2));
    border-radius: 2px;
    transition: width 0.8s ease;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 3px;
    background: white;
    opacity: 0.6;
  }

  /* Solidaridad */
  .solidaridad-block {
    margin-top: 14px;
  }

  .solid-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    margin-bottom: 6px;
    background: rgba(201,168,76,0.05);
    border: 1px solid rgba(201,168,76,0.15);
    border-left: 2px solid var(--gold);
  }

  .solid-left {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--textdim);
  }

  .solid-arrow {
    color: var(--gold);
    font-size: 12px;
  }

  .solid-amount {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--gold2);
  }

  .no-activity {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    padding: 12px;
    border: 1px dashed var(--border);
  }

  /* Martingala indicator */
  .mart-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    color: var(--textdim);
    margin-top: 10px;
  }

  .mart-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
  }

  .mart-dot.active-buy  { background: var(--green); }
  .mart-dot.active-sell { background: var(--red); }

  /* Toggle Demo / Real */
  .mode-toggle {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-right: 12px;
  }

  .mode-btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 5px 14px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }

  .mode-btn.active-demo {
    background: var(--gold);
    color: #000;
  }

  .mode-btn.active-real {
    background: var(--green);
    color: #000;
  }

  /* Footer */
  footer {
    margin-top: 28px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  footer span {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .error-msg {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--red);
    text-align: center;
    padding: 40px;
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo-block">
      <h1>PROYECTO S.E.M.</h1>
      <p id="modeLabel">SISTEMA DE TRADING ALGORÍTMICO · DEMO · VT MARKETS</p>
    </div>
    <div class="header-right">
      <div class="mode-toggle">
        <button class="mode-btn active-demo" id="btnDemo" onclick="setMode('demo')">DEMO</button>
        <button class="mode-btn" id="btnReal" onclick="setMode('real')">REAL</button>
      </div>
      <span class="live-dot" id="liveStatus">EN VIVO</span>
      <span class="timestamp" id="lastUpdate">--:--:--</span>
    </div>
  </header>

  <!-- ECOSYSTEM BAR -->
  <div class="ecosystem-bar" id="ecoBar">
    <div class="eco-stat">
      <span class="eco-label">Bots activos</span>
      <span class="eco-value" id="ecoActivos">—</span>
    </div>
    <div class="eco-stat">
      <span class="eco-label">Ciclos totales</span>
      <span class="eco-value" id="ecoCiclos">—</span>
    </div>
    <div class="eco-stat">
      <span class="eco-label">Ganancia Real Total</span>
      <span class="eco-value green" id="ecoGanancia">—</span>
    </div>
    <div class="eco-stat">
      <span class="eco-label">Hedges activos</span>
      <span class="eco-value orange" id="ecoHedges">—</span>
    </div>
  </div>

  <!-- BOTS GRID -->
  <div class="bots-grid" id="botsGrid">
    <div class="bot-card offline"><div class="no-activity">Cargando datos...</div></div>
    <div class="bot-card offline"><div class="no-activity">Cargando datos...</div></div>
    <div class="bot-card offline"><div class="no-activity">Cargando datos...</div></div>
    <div class="bot-card offline"><div class="no-activity">Cargando datos...</div></div>
  </div>

  <footer>
    <span>PROYECTO S.E.M. · v1.3.6</span>
    <span id="nextUpdate">Actualizando en 30s</span>
  </footer>

</div>

<script>
const DATA_URL_DEMO = 'https://raw.githubusercontent.com/curroparody/trading-dashboard/main/data_demo.json';
const DATA_URL_REAL = 'https://raw.githubusercontent.com/curroparody/trading-dashboard/main/data_real.json';

let currentMode = 'demo';

function setMode(mode) {
  currentMode = mode;
  const btnDemo = document.getElementById('btnDemo');
  const btnReal = document.getElementById('btnReal');
  const modeLabel = document.getElementById('modeLabel');

  if(mode === 'demo') {
    btnDemo.className = 'mode-btn active-demo';
    btnReal.className = 'mode-btn';
    modeLabel.textContent = 'SISTEMA DE TRADING ALGORÍTMICO · DEMO · VT MARKETS';
  } else {
    btnDemo.className = 'mode-btn';
    btnReal.className = 'mode-btn active-real';
    modeLabel.textContent = 'SISTEMA DE TRADING ALGORÍTMICO · REAL · VT MARKETS';
  }
  fetchData();
}

function getDataUrl() {
  return currentMode === 'real' ? DATA_URL_REAL : DATA_URL_DEMO;
}

const BOT_META = {
  oro:    { name: 'XAUUSD', label: 'ORO',    symbol: 'XAU/USD' },
  btc:    { name: 'BTCUSD', label: 'BITCOIN', symbol: 'BTC/USD' },
  ger40:  { name: 'GER40',  label: 'DAX 40', symbol: 'GER40' },
  usdjpy: { name: 'USDJPY', label: 'YEN',    symbol: 'USD/JPY' },
};

// Hucha_Aportado per compañero — leemos del JSON global
// Cada bot tiene su ganancia_real. Para solidaridad usamos hucha_aportado si está disponible.

let countdown = 30;
let countdownInterval;

function fmt(val, decimals=2) {
  if(val === undefined || val === null) return '—';
  return '$' + Number(val).toFixed(decimals);
}

function pct(val) {
  if(val === undefined || val === null) return '—';
  return Number(val).toFixed(1) + '%';
}

function renderBot(key, data, allData) {
  const meta = BOT_META[key];
  if(!data || Object.keys(data).length === 0) {
    return `
      <div class="bot-card offline">
        <div class="card-header">
          <div>
            <div class="card-title">${meta.label}</div>
            <div class="card-subtitle">${meta.symbol}</div>
          </div>
          <span class="status-badge offline">OFFLINE</span>
        </div>
        <div class="no-activity">Sin datos del bot</div>
      </div>`;
  }

  const hedge = data.hedge || {};
  const mart  = data.martingala || {};
  const hasHedge = hedge.activo === true;
  const hasMart  = mart.activa === true;

  // Status badge
  const badgeClass = hasHedge ? 'hedge' : 'ok';
  const badgeText  = hasHedge ? '🔴 HEDGE' : '✅ ACTIVO';

  // Card class
  const cardClass = hasHedge ? 'bot-card hedge-active' : 'bot-card';

  // Stats row — sin flotante
  const ciclos = data.ciclos !== undefined ? data.ciclos : '—';
  const gr     = data.ganancia_real !== undefined ? fmt(data.ganancia_real) : '—';

  // Martingala indicator
  let martHtml = '';
  if(hasMart) {
    const dotClass = mart.direccion === 'BUY' ? 'mart-dot active-buy' : 'mart-dot active-sell';
    martHtml = `
      <div class="mart-indicator">
        <span class="${dotClass}"></span>
        ${mart.direccion} N${mart.nivel || 1} · ${mart.precio ? mart.precio.toFixed(2) : '—'}
      </div>`;
  }

  // Hucha propia
  const huchaPropia = data.hucha_propia !== undefined ? data.hucha_propia : null;
  const huchaTope   = 30;
  const huchaPct    = huchaPropia !== null ? Math.min((huchaPropia / huchaTope) * 100, 100) : 0;

  let huchaHtml = '';
  if(huchaPropia !== null) {
    huchaHtml = `
      <div class="hucha-block">
        <div class="section-label">🐷 Hucha propia</div>
        <div class="hucha-row">
          <span class="hucha-label">Acumulado</span>
          <span class="hucha-amount">${fmt(huchaPropia)} / $${huchaTope.toFixed(2)}</span>
        </div>
        <div class="hucha-bar-track">
          <div class="hucha-bar-fill" style="width:${huchaPct.toFixed(1)}%"></div>
        </div>
      </div>`;
  }

  // Hedge propio
  let hedgeHtml = '';
  if(hasHedge) {
    const hPct = hedge.pct !== undefined ? Math.min(hedge.pct, 100) : 0;
    hedgeHtml = `
      <div class="hedge-block">
        <div class="hedge-header">
          <span class="hedge-title">🔴 HEDGE #${hedge.numero || 1} ACTIVO</span>
          <span class="hedge-pct">${pct(hedge.pct)}</span>
        </div>
        <div class="hedge-details">
          <div class="hedge-detail">
            <span class="hedge-detail-label">Objetivo</span>
            <span class="hedge-detail-value">${fmt(hedge.objetivo)}</span>
          </div>
          <div class="hedge-detail">
            <span class="hedge-detail-label">Fondo</span>
            <span class="hedge-detail-value">${fmt(hedge.fondo)}</span>
          </div>
          <div class="hedge-detail">
            <span class="hedge-detail-label">Restante</span>
            <span class="hedge-detail-value">${hedge.objetivo && hedge.fondo ? fmt(hedge.objetivo - hedge.fondo) : '—'}</span>
          </div>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${hPct.toFixed(1)}%"></div>
        </div>
      </div>`;
  }

  // Solidaridad — qué hedges de compañeros están activos, ordenados por fecha (más antiguo primero)
  const botKeys = Object.keys(BOT_META).filter(k => k !== key);
  let solidItems = [];
  for(const compKey of botKeys) {
    const compData = allData[compKey];
    if(!compData || Object.keys(compData).length === 0) continue;
    const compHedge = compData.hedge || {};
    if(compHedge.activo !== true) continue;
    const compMeta = BOT_META[compKey];
    solidItems.push({ meta: compMeta, pctHedge: compHedge.pct, fecha: compHedge.fecha_activacion || 0 });
  }
  // Ordenar por fecha de activación ascendente (más antiguo primero)
  solidItems.sort((a, b) => a.fecha - b.fecha);

  // hucha_aportado es el total solidario acumulado por este bot
  const totalAportado = data.hucha_aportado !== undefined && data.hucha_aportado > 0
    ? data.hucha_aportado : null;

  let solidHtml = '';
  if(!hasHedge) {
    solidHtml = `<div class="solidaridad-block"><div class="section-label">🤝 Solidaridad</div>`;
    if(solidItems.length === 0) {
      solidHtml += `<div class="no-activity">Sin hedges activos en el ecosistema</div>`;
    } else {
      for(let i = 0; i < solidItems.length; i++) {
        const s = solidItems[i];
        const isDestino = i === 0; // El más antiguo es el destino real de las aportaciones
        solidHtml += `
          <div class="solid-item" style="${isDestino ? 'opacity:1' : 'opacity:0.4'}">
            <div class="solid-left">
              <span class="solid-arrow">${isDestino ? '→' : '·'}</span>
              ${s.meta.label} Hedge · ${pct(s.pctHedge)} completado
              ${isDestino ? '<span style="font-size:10px;color:var(--gold);margin-left:6px">DESTINO</span>' : ''}
            </div>
            <span class="solid-amount">${isDestino && totalAportado ? fmt(totalAportado) : ''}</span>
          </div>`;
      }
      if(totalAportado) {
        solidHtml += `<div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:6px">Total aportado al ecosistema: ${fmt(totalAportado)}</div>`;
      }
    }
    solidHtml += `</div>`;
  }

  return `
    <div class="${cardClass}">
      <div class="card-header">
        <div>
          <div class="card-title">${meta.label}</div>
          <div class="card-subtitle">${meta.symbol}</div>
        </div>
        <span class="status-badge ${badgeClass}">${badgeText}</span>
      </div>

      <div class="stats-row">
        <div class="stat-item">
          <span class="stat-label">Ciclos</span>
          <span class="stat-value">${ciclos}</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Ganancia Real</span>
          <span class="stat-value gold">${gr}</span>
        </div>
      </div>

      ${huchaHtml}
      ${hedgeHtml}
      ${solidHtml}
      ${martHtml}
    </div>`;
}

async function fetchData() {
  try {
    const res = await fetch(getDataUrl() + '?t=' + Date.now());
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    // Timestamp
    document.getElementById('lastUpdate').textContent = data.timestamp || '—';

    // Ecosystem
    const eco = data.ecosistema || {};
    document.getElementById('ecoActivos').textContent  = eco.bots_activos  ?? '—';
    document.getElementById('ecoCiclos').textContent   = eco.ciclos_total  ?? '—';
    document.getElementById('ecoGanancia').textContent = eco.ganancia_real_total !== undefined ? '$' + Number(eco.ganancia_real_total).toFixed(2) : '—';
    document.getElementById('ecoHedges').textContent   = eco.hedges_activos ?? '—';

    // Bots
    const allData = {
      oro:    data.oro    || {},
      btc:    data.btc    || {},
      ger40:  data.ger40  || {},
      usdjpy: data.usdjpy || {},
    };

    let html = '';
    for(const key of Object.keys(BOT_META)) {
      html += renderBot(key, allData[key], allData);
    }
    document.getElementById('botsGrid').innerHTML = html;

    // Live indicator
    document.getElementById('liveStatus').style.color = 'var(--green)';

  } catch(e) {
    document.getElementById('liveStatus').style.color = 'var(--red)';
    document.getElementById('liveStatus').textContent = 'ERROR';
    console.error(e);
  }

  // Reset countdown
  countdown = 30;
}

function startCountdown() {
  clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    countdown--;
    document.getElementById('nextUpdate').textContent = `Actualizando en ${countdown}s`;
    if(countdown <= 0) {
      fetchData();
    }
  }, 1000);
}

// Init
fetchData();
startCountdown();
setInterval(fetchData, 30000);
</script>
