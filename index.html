<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PROYECTO S.E.M.</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060a0f;
    --surface: #0c1420;
    --surface2: #101c2c;
    --border: #162030;
    --gold: #e8a020;
    --btc: #f7921a;
    --green: #00c853;
    --red: #ff1744;
    --blue: #2962ff;
    --text: #d0e8ff;
    --dim: #3a5570;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    font-size: 13px;
  }
  .wrap { max-width: 420px; margin: 0 auto; padding: 12px; }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .title {
    font-family: var(--display);
    font-size: 26px;
    letter-spacing: 3px;
    color: var(--text);
  }
  .title span { color: var(--gold); }
  .live {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .timestamp {
    text-align: center;
    font-size: 10px;
    color: var(--dim);
    margin-bottom: 14px;
    letter-spacing: 1px;
  }

  /* TABS */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 16px;
  }
  .tab {
    padding: 9px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--dim);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    letter-spacing: 2px;
    transition: all .2s;
  }
  .tab.active { border-color: var(--gold); color: var(--gold); background: rgba(232,160,32,.08); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* BOT CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    border-radius: 8px 0 0 8px;
  }
  .card.gold::before { background: var(--gold); }
  .card.btc::before { background: var(--btc); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .card-name {
    font-family: var(--display);
    font-size: 18px;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sym {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 1px;
    font-weight: 400;
  }
  .gold .sym { background: rgba(232,160,32,.12); color: var(--gold); }
  .btc .sym { background: rgba(247,146,26,.12); color: var(--btc); }
  .ciclos { font-size: 11px; color: var(--dim); }
  .ciclos span { color: var(--text); font-weight: 700; }

  /* OP ACTIVA */
  .op-row {
    background: var(--surface2);
    border-radius: 5px;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 11px;
  }
  .op-label { color: var(--dim); letter-spacing: 1px; text-transform: uppercase; }
  .op-val { display: flex; gap: 6px; align-items: center; }
  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 1px;
  }
  .badge.buy { background: rgba(0,200,83,.12); color: var(--green); }
  .badge.sell { background: rgba(255,23,68,.12); color: var(--red); }
  .badge.n2 { background: rgba(255,193,7,.12); color: #ffc107; }

  /* BLOQUE HEDGE / HUCHA */
  .block {
    background: var(--surface2);
    border-radius: 5px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .block:last-child { margin-bottom: 0; }
  .block-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .block-title {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .block-pct {
    font-family: var(--display);
    font-size: 18px;
    letter-spacing: 1px;
  }
  .gold .block-pct { color: var(--gold); }
  .btc .block-pct { color: var(--btc); }
  .pct-hucha { color: var(--green) !important; }

  .bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 7px;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s ease;
  }
  .gold .bar-fill.hedge-fill { background: linear-gradient(90deg, #7a4a0a, var(--gold)); }
  .btc .bar-fill.hedge-fill { background: linear-gradient(90deg, #7a4a0a, var(--btc)); }
  .bar-fill.hucha-fill { background: linear-gradient(90deg, #004d26, var(--green)); }

  .amounts {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--dim);
  }
  .amounts span { color: var(--text); }

  .no-hedge {
    font-size: 11px;
    color: var(--green);
    padding: 8px 0 0;
    letter-spacing: 1px;
  }

  .solidario {
    font-size: 11px;
    color: var(--blue);
    margin-top: 6px;
    letter-spacing: .5px;
  }

  footer {
    text-align: center;
    font-size: 10px;
    color: var(--dim);
    padding: 16px 0 8px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="title">PROYECTO <span>S.E.M.</span></div>
    <div class="live">
      <div class="dot" id="dot"></div>
      <span id="liveText">EN VIVO</span>
    </div>
  </div>

  <div class="timestamp" id="ts">—</div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('demo')">DEMO</div>
    <div class="tab" onclick="switchTab('real')">REAL</div>
  </div>

  <!-- DEMO -->
  <div class="tab-content active" id="tab-demo">
    <div id="demo-oro" class="card gold"></div>
    <div id="demo-btc" class="card btc"></div>
  </div>

  <!-- REAL -->
  <div class="tab-content" id="tab-real">
    <div id="real-oro" class="card gold"></div>
    <div id="real-btc" class="card btc"></div>
  </div>

  <footer>PROYECTO S.E.M. · Actualización cada 30s</footer>
</div>

<script>
const DEMO_URL = 'https://raw.githubusercontent.com/curroparody/trading-dashboard/main/data_demo.json';
const REAL_URL = 'https://raw.githubusercontent.com/curroparody/trading-dashboard/main/data_real.json';

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['demo','real'][i]===t));
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
}

function fmt(n){ return '$'+(+n||0).toFixed(2); }
function pct(a,b){ return b>0?Math.min((a/b)*100,100).toFixed(1):0; }

function renderBot(id, par, data){
  const el = document.getElementById(id);
  if(!data){ el.innerHTML='<div style="color:var(--dim);padding:10px;font-size:11px">Sin datos</div>'; return; }

  const isGold = par==='oro';
  const label = isGold ? 'ORO' : 'BITCOIN';
  const sym   = isGold ? 'XAUUSD' : 'BTCUSD';

  // Operacion activa
  let opHTML = '<span style="color:var(--dim)">Sin operación</span>';
  if(data.martingala && data.martingala.activa){
    const d = (data.martingala.direccion||'').toLowerCase();
    opHTML = `<span class="badge ${d}">${data.martingala.direccion}</span>
      ${data.martingala.nivel>1?`<span class="badge n2">N${data.martingala.nivel}</span>`:''}
      <span style="color:var(--dim);font-size:11px">${fmt(data.martingala.precio)}</span>`;
  }

  // Hedge
  let hedgeHTML = '<div class="no-hedge">✓ Sin hedge activo</div>';
  if(data.hedge && data.hedge.activo){
    const p = pct(data.hedge.fondo, data.hedge.objetivo);
    hedgeHTML = `<div class="block">
      <div class="block-header">
        <div class="block-title">🔴 HEDGE ${data.hedge.numero}</div>
        <div class="block-pct">${p}%</div>
      </div>
      <div class="bar"><div class="bar-fill hedge-fill" style="width:${p}%"></div></div>
      <div class="amounts">Fondo: <span>${fmt(data.hedge.fondo)}</span> &nbsp;/&nbsp; Objetivo: <span>${fmt(data.hedge.objetivo)}</span></div>
    </div>`;
  }

  // Hucha
  let huchaHTML = '';
  if(data.hucha !== undefined){
    const ph = pct(data.hucha, data.hucha_tope||30);
    huchaHTML = `<div class="block">
      <div class="block-header">
        <div class="block-title">🐷 HUCHA</div>
        <div class="block-pct pct-hucha">${ph}%</div>
      </div>
      <div class="bar"><div class="bar-fill hucha-fill" style="width:${ph}%"></div></div>
      <div class="amounts">Acumulado: <span>${fmt(data.hucha)}</span> &nbsp;/&nbsp; Tope: <span>${fmt(data.hucha_tope||30)}</span></div>
      ${data.hucha_aportado>0?`<div class="solidario">🤝 Solidario: ${fmt(data.hucha_aportado)}</div>`:''}
    </div>`;
  }

  el.innerHTML = `
    <div class="card-header">
      <div class="card-name">${label} <span class="sym">${sym}</span></div>
      <div class="ciclos">CICLOS <span>${data.ciclos||0}</span></div>
    </div>
    <div class="op-row">
      <div class="op-label">Operación activa</div>
      <div class="op-val">${opHTML}</div>
    </div>
    ${hedgeHTML}
    ${huchaHTML}`;
}

async function fetchAndRender(){
  try {
    const [rd, rr] = await Promise.all([
      fetch(DEMO_URL+'?t='+Date.now()).catch(()=>null),
      fetch(REAL_URL+'?t='+Date.now()).catch(()=>null)
    ]);

    if(rd && rd.ok){
      const d = await rd.json();
      renderBot('demo-oro','oro',d.oro);
      renderBot('demo-btc','btc',d.btc);
    }
    if(rr && rr.ok){
      const r = await rr.json();
      renderBot('real-oro','oro',r.oro);
      renderBot('real-btc','btc',r.btc);
    }

    document.getElementById('dot').style.background='var(--green)';
    document.getElementById('dot').style.boxShadow='0 0 8px var(--green)';
    document.getElementById('liveText').textContent='EN VIVO';
    document.getElementById('ts').textContent='Actualizado: '+new Date().toLocaleTimeString('es-ES');

  } catch(e){
    document.getElementById('dot').style.background='#ffc107';
    document.getElementById('liveText').textContent='SIN DATOS';
  }
}

fetchAndRender();
setInterval(fetchAndRender, 30000);
</script>
</body>
</html>
